<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>堕天使の羽集めゲーム</title>
<style>
body{margin:0;overflow:hidden;background:#000;color:#fff;font-family:sans-serif;}

#game{position:relative;width:100vw;height:100vh;display:none;overflow:hidden;}

/* 背景エリア */
.area{position:absolute;width:100%;height:100%;top:0;left:0;display:none;}

#city{background:linear-gradient(#02030a,#0a0f2a);}
#sky{background:linear-gradient(#000428,#004e92);} 
#sea{background:linear-gradient(#001f3f,#003f7f);} 

.active{display:block;}

/* プレイヤー */
#player{
 position:absolute;width:64px;height:80px;
 background:url("fallen_angel_walk.png") no-repeat;
 background-size:256px 80px;
 filter:brightness(0) drop-shadow(0 0 12px red);
 animation:walk 0.6s steps(4) infinite;
 animation-play-state:paused;
}

@keyframes walk{from{background-position:0}to{background-position:-256px}}

/* 羽 */
.feather{
 position:absolute;width:34px;height:34px;
 background:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><path d='M50 5 C70 20,90 40,70 75 C60 90,40 90,30 75 C10 40,30 20,50 5 Z' fill='white'/><path d='M50 5 L50 95' stroke='red' stroke-width='2'/></svg>");
 background-size:contain;
 filter:brightness(1.6) drop-shadow(0 0 12px white) drop-shadow(0 0 20px red);
 transition:0.2s;
}

.feather.near{
 transform:scale(1.6);
 filter:brightness(2) drop-shadow(0 0 18px white) drop-shadow(0 0 30px red);
}

#ui{position:fixed;top:10px;left:10px;display:none;}
#instruction{position:fixed;top:40px;left:10px;display:none;font-size:14px;}

#story,#ending{position:fixed;width:100%;height:100%;background:#000;display:flex;justify-content:center;align-items:center;flex-direction:column;text-align:center;}
#ending{display:none;}

#fade{position:fixed;width:100%;height:100%;background:white;opacity:0;transition:2s;}
</style>
</head>
<body>

<div id="story">
<h1>堕天使の記憶</h1>
<p>世界に散らばった羽を集めろ</p>
<button onclick="startGame()">開始</button>
</div>

<div id="game">
<div id="city" class="area active"></div>
<div id="sky" class="area"></div>
<div id="sea" class="area"></div>
<div id="player"></div>
</div>

<div id="ui">羽: <span id="count">0</span>/15</div>
<div id="instruction">矢印キー移動 / Shiftダッシュ / Zでエリア切替</div>

<div id="ending">
<h1>天へ還る</h1>
<img src="angel_end.png" width="300">
</div>

<div id="fade"></div>

<script>
const player=document.getElementById("player");
const areas=document.querySelectorAll(".area");
let current=0;
let x=100,y=100,count=0,dash=false;

function update(){player.style.left=x+"px";player.style.top=y+"px";}

function switchArea(){
 areas[current].classList.remove("active");
 current=(current+1)%areas.length;
 areas[current].classList.add("active");
}

document.addEventListener("keydown",e=>{
 if(document.getElementById("game").style.display==="none")return;
 if(e.key==="Shift")dash=true;
 if(e.key==="z"||e.key==="Z")switchArea();
 player.style.animationPlayState="running";
 let s=dash?10:5;
 if(e.key==="ArrowUp")y-=s;
 if(e.key==="ArrowDown")y+=s;
 if(e.key==="ArrowLeft")x-=s;
 if(e.key==="ArrowRight")x+=s;
 update();check();
});

document.addEventListener("keyup",e=>{
 if(e.key==="Shift")dash=false;
 player.style.animationPlayState="paused";
});

function createFeather(area){
 const f=document.createElement("div");
 f.className="feather";
 f.style.left=Math.random()*window.innerWidth+"px";
 f.style.top=Math.random()*window.innerHeight+"px";
 area.appendChild(f);
}

areas.forEach(area=>{
 for(let i=0;i<5;i++)createFeather(area);
});

function check(){
 document.querySelectorAll(".active .feather").forEach(f=>{
  let dx=x-f.offsetLeft,dy=y-f.offsetTop;
  let d=Math.sqrt(dx*dx+dy*dy);
  if(d<120)f.classList.add("near"); else f.classList.remove("near");
  if(d<30){f.remove();count++;document.getElementById("count").textContent=count;
   if(count===15)setTimeout(end,1000);
  }
 });
}

function end(){
 document.getElementById("fade").style.opacity=1;
 setTimeout(()=>{
  document.getElementById("game").style.display="none";
  document.getElementById("ending").style.display="flex";
 },2000);
}

function startGame(){
 document.getElementById("story").style.display="none";
 document.getElementById("game").style.display="block";
 document.getElementById("ui").style.display="block";
 document.getElementById("instruction").style.display="block";
}

update();
</script>

</body>
</html>
