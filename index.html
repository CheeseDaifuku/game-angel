<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<title>堕天使の羽集めゲーム</title>
<style>
body{margin:0;overflow:hidden;background:#000;color:#fff;font-family:sans-serif;}

#game{position:relative;width:100vw;height:100vh;display:none;overflow:hidden;}

.area{position:absolute;width:100%;height:100%;top:0;left:0;display:none;}
#hub{background:linear-gradient(#000,#111);}
#city{background:linear-gradient(#02030a,#0a0f2a);}
#sky{background:linear-gradient(#000428,#004e92);}
#sea{background:linear-gradient(#001f3f,#003f7f);}
.active{display:block;}

.portal{
position:absolute;width:120px;height:80px;
border:2px solid #fff;border-radius:10px;
background-size:cover;background-position:center;
filter:brightness(0.8);
transition:0.2s;
}
.portal.near{
transform:scale(1.2);
filter:brightness(1.2) drop-shadow(0 0 10px white);
}

#p_city{left:20%;top:60%;background-image:url('https://picsum.photos/200/120?city');}
#p_sky{left:45%;top:40%;background-image:url('https://picsum.photos/200/120?sky');}
#p_sea{left:70%;top:65%;background-image:url('https://picsum.photos/200/120?sea');}

/* ★プレイヤー：中央固定＋超発光 */
#player{
position:fixed;
left:50%;
top:50%;
transform:translate(-50%,-50%);
width:64px;height:80px;
background:url("fallen_angel_walk.png") no-repeat;
background-size:256px 80px;

filter:
brightness(2)
contrast(1.5)
drop-shadow(0 0 15px white)
drop-shadow(0 0 30px red)
drop-shadow(0 0 60px red);

animation:walk 0.6s steps(4) infinite;
animation-play-state:paused;
z-index:1000;
}
@keyframes walk{from{background-position:0}to{background-position:-256px}}

/* ★羽：超強調 */
.feather{
position:absolute;width:34px;height:34px;
background:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><path d='M50 5 C70 20,90 40,70 75 C60 90,40 90,30 75 C10 40,30 20,50 5 Z' fill='white'/><path d='M50 5 L50 95' stroke='red' stroke-width='2'/></svg>");
background-size:contain;

filter:
brightness(2)
drop-shadow(0 0 20px white)
drop-shadow(0 0 40px red)
drop-shadow(0 0 80px red);

animation:float 2s ease-in-out infinite;
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-10px);}
}

.feather::after{
content:"";
position:absolute;
inset:-10px;
border:2px solid rgba(255,0,0,0.5);
border-radius:50%;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{opacity:1;transform:scale(1);}
100%{opacity:0;transform:scale(2);}
}

/* ★矢印 */
.arrow{
position:fixed;
width:20px;height:20px;
border-top:3px solid red;
border-right:3px solid red;
transform:rotate(45deg);
z-index:999;
}

#ui{position:fixed;top:10px;left:10px;display:none;}
#instruction{position:fixed;top:40px;left:10px;display:none;font-size:14px;}

#story,#ending{position:fixed;width:100%;height:100%;background:#000;display:flex;justify-content:center;align-items:center;flex-direction:column;text-align:center;}
#ending{display:none;}

#fade{position:fixed;width:100%;height:100%;background:white;opacity:0;transition:2s;} </style>

</head>
<body>

<div id="story">
<h1>堕天使の記憶</h1>
<p>世界に散らばった羽を集めろ</p>
<button onclick="startGame()">開始</button>
</div>

<div id="game">
<div id="hub" class="area active">
  <div id="p_city" class="portal" data-target="city"></div>
  <div id="p_sky" class="portal" data-target="sky"></div>
  <div id="p_sea" class="portal" data-target="sea"></div>
</div>
<div id="city" class="area"></div>
<div id="sky" class="area"></div>
<div id="sea" class="area"></div>
<div id="player"></div>
</div>

<div id="ui">羽: <span id="count">0</span>/15</div>
<div id="instruction">矢印キー移動 / Shiftダッシュ / クリックダッシュ</div>

<div id="ending">
<h1>天へ還る</h1>
<img src="angel_end.png" width="300">
</div>

<div id="fade"></div>

<script>
const player=document.getElementById("player");
const areas={hub:document.getElementById("hub"),city:document.getElementById("city"),sky:document.getElementById("sky"),sea:document.getElementById("sea")};

let current='hub';
let x=100,y=100,count=0,dash=false;
let arrows=[];

/* 位置更新（見えない内部座標） */
function update(){}

/* エリア移動 */
function moveArea(name){
 areas[current].classList.remove("active");
 current=name;
 areas[current].classList.add("active");
 x=100;y=100;
}

/* 移動 */
document.addEventListener("keydown",e=>{
 if(document.getElementById("game").style.display==="none")return;

 if(e.key==="Shift")dash=true;
 player.style.animationPlayState="running";

 let s=dash?10:5;

 if(e.key==="ArrowUp")y-=s;
 if(e.key==="ArrowDown")y+=s;
 if(e.key==="ArrowLeft")x-=s;
 if(e.key==="ArrowRight")x+=s;

 check();
});

document.addEventListener("keyup",e=>{
 if(e.key==="Shift")dash=false;
 player.style.animationPlayState="paused";
});

document.addEventListener("click",()=>{
 if(document.getElementById("game").style.display==="none")return;
 dash=true;
 setTimeout(()=>dash=false,200);
});

/* 羽生成＋矢印 */
function createFeather(area){
 const f=document.createElement("div");
 f.className="feather";
 f.style.left=Math.random()*window.innerWidth+"px";
 f.style.top=Math.random()*window.innerHeight+"px";
 area.appendChild(f);

 const a=document.createElement("div");
 a.className="arrow";
 document.body.appendChild(a);

 arrows.push({feather:f,arrow:a});
}

/* 各エリアに羽 */
Object.values(areas).forEach(area=>{
 if(area.id!=='hub'){
  for(let i=0;i<5;i++)createFeather(area);
 }
});

/* 判定 */
function check(){

 /* 羽＆矢印 */
 arrows.forEach(obj=>{
  if(!document.body.contains(obj.feather)){
   obj.arrow.style.display="none";
   return;
  }

  let dx=obj.feather.offsetLeft-x;
  let dy=obj.feather.offsetTop-y;
  let d=Math.sqrt(dx*dx+dy*dy);

  let angle=Math.atan2(dy,dx)*180/Math.PI;

  obj.arrow.style.display="block";
  obj.arrow.style.left="50%";
  obj.arrow.style.top="50%";
  obj.arrow.style.transform=`translate(-50%,-50%) rotate(${angle}deg)`;

  if(d<120)obj.feather.classList.add("near");
  else obj.feather.classList.remove("near");

  if(d<30){
   obj.feather.remove();
   obj.arrow.remove();
   count++;
   document.getElementById("count").textContent=count;
   if(count===15)setTimeout(end,1000);
  }
 });

 /* ポータル */
 if(current==='hub'){
  document.querySelectorAll('.portal').forEach(p=>{
    let dx=x-p.offsetLeft,dy=y-p.offsetTop;
    let d=Math.sqrt(dx*dx+dy*dy);

    if(d<120)p.classList.add('near');
    else p.classList.remove('near');

    if(d<40)moveArea(p.dataset.target);
  });
 }
}

/* エンディング */
function end(){
 document.getElementById("fade").style.opacity=1;
 setTimeout(()=>{
  document.getElementById("game").style.display="none";
  document.getElementById("ending").style.display="flex";
 },2000);
}

/* 開始 */
function startGame(){
 document.getElementById("story").style.display="none";
 document.getElementById("game").style.display="block";
 document.getElementById("ui").style.display="block";
 document.getElementById("instruction").style.display="block";
}

</script>

</body>
</html>
