<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<title>堕天使の羽集めゲーム 完成版</title>
<style>
body{margin:0;overflow:hidden;background:#000;color:#fff;font-family:sans-serif;}

#game{position:relative;width:100vw;height:100vh;display:none;}
.area{position:absolute;width:100%;height:100%;display:none;}
.active{display:block;}

#hub{background:linear-gradient(#000,#111);}
#city{background:linear-gradient(#02030a,#0a0f2a);}
#sky{background:linear-gradient(#000428,#004e92);}
#sea{background:linear-gradient(#001f3f,#003f7f);}

/* ポータル */
.portal{
position:absolute;width:120px;height:80px;
border:2px solid #fff;border-radius:10px;
background:#222;
}
.portal.near{
transform:scale(1.2);
box-shadow:0 0 20px white;
}

/* プレイヤー（堕天使） */
#player{
position:fixed;
left:50%;top:50%;
transform:translate(-50%,-50%);
width:60px;height:60px;
background:radial-gradient(circle,white,red,black);
border-radius:50%;
box-shadow:0 0 30px red,0 0 60px red,0 0 100px white;
z-index:1000;
}

/* 羽 */
.feather{
position:absolute;width:25px;height:25px;
background:white;
border-radius:50%;
box-shadow:0 0 15px white,0 0 30px red,0 0 60px red;
animation:float 2s infinite;
}
@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-10px);}
}

/* 矢印ナビ */
.arrow{
position:fixed;
width:15px;height:15px;
border-top:3px solid red;
border-right:3px solid red;
z-index:999;
}

/* UI */
#ui{
position:fixed;top:10px;left:10px;
background:rgba(0,0,0,0.5);
padding:8px;border-radius:8px;
display:none;
}

/* スタート画面 */
#story{
position:fixed;width:100%;height:100%;
display:flex;justify-content:center;align-items:center;
flex-direction:column;background:#000;
z-index:2000;
}
#story button{
padding:12px 24px;
font-size:18px;
cursor:pointer;
}

/* エンディング */
#ending{
position:fixed;width:100%;height:100%;
display:none;
justify-content:center;align-items:center;
flex-direction:column;background:#000;
} </style>

</head>
<body>

<div id="story">
<h1>堕天使の記憶</h1>
<p>クリック or ボタンで開始</p>
<button id="startBtn">開始</button>
</div>

<div id="game">
<div id="hub" class="area active">
 <div class="portal" style="left:20%;top:60%" data-target="city"></div>
 <div class="portal" style="left:50%;top:40%" data-target="sky"></div>
 <div class="portal" style="left:75%;top:65%" data-target="sea"></div>
</div>
<div id="city" class="area"></div>
<div id="sky" class="area"></div>
<div id="sea" class="area"></div>
<div id="player"></div>
</div>

<div id="ui">羽: <span id="count">0</span>/15</div>

<div id="ending">
<h1>天へ還る</h1>
</div>

<script>
const areas={hub,city,sky,sea};

let current='hub';
let x=100,y=100,count=0,dash=false;
let arrows=[];

/* 開始 */
function startGame(){
 story.style.display="none";
 game.style.display="block";
 ui.style.display="block";
}

/* ボタン確実に動く */
startBtn.addEventListener("click",(e)=>{
 e.stopPropagation();
 startGame();
});

/* どこクリックでも開始 */
story.addEventListener("click",startGame);

/* 移動 */
document.addEventListener("keydown",e=>{
 if(game.style.display==="none")return;

 let s=(dash||e.shiftKey)?10:5;

 if(e.key==="ArrowUp")y-=s;
 if(e.key==="ArrowDown")y+=s;
 if(e.key==="ArrowLeft")x-=s;
 if(e.key==="ArrowRight")x+=s;

 check();
});

/* クリックダッシュ（ゲーム中のみ） */
document.addEventListener("click",()=>{
 if(game.style.display==="none")return;
 dash=true;
 setTimeout(()=>dash=false,200);
});

/* 羽生成 */
function createFeather(area){
 const f=document.createElement("div");
 f.className="feather";
 f.style.left=Math.random()*innerWidth+"px";
 f.style.top=Math.random()*innerHeight+"px";
 area.appendChild(f);

 const a=document.createElement("div");
 a.className="arrow";
 document.body.appendChild(a);

 arrows.push({f,a});
}

/* 初期配置 */
Object.values(areas).forEach(a=>{
 if(a.id!=="hub"){
  for(let i=0;i<5;i++)createFeather(a);
 }
});

/* エリア移動 */
function moveArea(name){
 areas[current].classList.remove("active");
 current=name;
 areas[current].classList.add("active");
}

/* 判定 */
function check(){
 arrows.forEach(o=>{
  if(!document.body.contains(o.f)){
   o.a.style.display="none";
   return;
  }

  let dx=o.f.offsetLeft-x;
  let dy=o.f.offsetTop-y;
  let d=Math.hypot(dx,dy);

  let ang=Math.atan2(dy,dx)*180/Math.PI;
  o.a.style.left="50%";
  o.a.style.top="50%";
  o.a.style.transform=`translate(-50%,-50%) rotate(${ang}deg)`;

  if(d<25){
   o.f.remove();
   o.a.remove();
   count++;
   countEl.textContent=count;
   if(count===15)ending.style.display="flex";
  }
 });

 if(current==="hub"){
  document.querySelectorAll(".portal").forEach(p=>{
   let dx=x-p.offsetLeft;
   let dy=y-p.offsetTop;
   let d=Math.hypot(dx,dy);

   if(d<100)p.classList.add("near");
   else p.classList.remove("near");

   if(d<40)moveArea(p.dataset.target);
  });
 }
}

const countEl=document.getElementById("count");
</script>

</body>
</html>
