<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>堕天使の羽集めゲーム</title>
  <style>
    body { margin:0; overflow:hidden; font-family:"Hiragino Kaku Gothic ProN", sans-serif; color:#fff; }

    #game {
      position:relative; width:100vw; height:100vh; display:none;
      background:linear-gradient(#02030a, #0a0f2a);
      overflow:hidden;
    }

    /* 月 */
    #moon{
      position:absolute; top:60px; right:80px;
      width:120px; height:120px;
      background:radial-gradient(circle,#fff,#ddd 60%,transparent 70%);
      border-radius:50%;
      box-shadow:0 0 40px rgba(255,255,255,0.6);
      opacity:0.9;
    }

    /* 建物（レイヤー1） */
    .city{
      position:absolute; bottom:0; width:100%; height:45%;
      display:flex; align-items:flex-end;
      gap:4px;
    }

    .building{
      width:40px;
      background:#05070f;
      position:relative;
    }

    /* ランダム高さっぽく見せる */
    .b1{height:60%;}
    .b2{height:80%;}
    .b3{height:50%;}
    .b4{height:70%;}
    .b5{height:90%;}

    /* 窓 */
    .building::after{
      content:"";
      position:absolute; width:100%; height:100%;
      background-image:radial-gradient(#ffd700 1px, transparent 1px);
      background-size:12px 12px;
      opacity:0.25;
    }

    /* プレイヤー（人っぽさ強化） */
    #player {
      position:absolute; width:64px; height:64px;
      background-image:url("fallen_angel_walk.png");
      background-size:256px 64px;
      filter:brightness(0) drop-shadow(0 0 12px red);
      animation:walk 0.6s steps(4) infinite;
      animation-play-state:paused;
    }

    /* 光輪 */
    #player::before{
      content:""; position:absolute; top:-14px; left:8px;
      width:48px; height:14px; border:2px solid red; border-radius:50%;
      box-shadow:0 0 15px red;
      transform:rotate(-15deg);
    }

    /* 翼（人っぽく） */
    #player::after{
      content:""; position:absolute; top:8px; left:-35px;
      width:130px; height:60px;
      background:radial-gradient(circle at left,rgba(0,0,0,0.9),transparent 70%),
                 radial-gradient(circle at right,rgba(0,0,0,0.9),transparent 70%);
      filter:blur(1px) drop-shadow(0 0 12px red);
      z-index:-1;
    }

    @keyframes walk{ from{background-position:0 0;} to{background-position:-256px 0;} }

    .feather{
      position:absolute; width:30px; height:30px;
      background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><path d='M50 5 C70 20, 90 40, 70 75 C60 90,40 90,30 75 C10 40,30 20,50 5 Z' fill='white'/><path d='M50 5 L50 95' stroke='red' stroke-width='2'/></svg>");
      background-size:contain; background-repeat:no-repeat;
      filter:drop-shadow(0 0 6px white) drop-shadow(0 0 12px red);
      animation:float 2s ease-in-out infinite alternate;
    }

    @keyframes float{ from{transform:translateY(0);} to{transform:translateY(-10px) rotate(5deg);} }

    #ui{ position:fixed; top:10px; left:10px; display:none; }
    #instruction{ position:fixed; top:40px; left:10px; font-size:14px; opacity:0.8; display:none; }
    #goal{ position:fixed; bottom:20px; right:20px; background:red; padding:10px 20px; border-radius:10px; display:none; }

    #story, #ending{
      position:fixed; width:100%; height:100%; background:rgba(0,0,0,0.95);
      display:flex; justify-content:center; align-items:center; text-align:center; flex-direction:column;
    }
    #ending{ display:none; }

    #fade {
      position:fixed; width:100%; height:100%; background:white;
      opacity:0; pointer-events:none;
      transition:opacity 2s;
    }

    #startBtn{ margin-top:20px; padding:10px 20px; background:red; border:none; color:#fff; border-radius:10px; cursor:pointer; }

    #ending img{ width:300px; margin-top:20px; filter:drop-shadow(0 0 20px white); }
  </style>
</head>
<body>

<div id="story">
  <h1>堕天使の記憶</h1>
  <p>禁忌に触れ、地上へ堕とされた天使。<br>夜の街に散らばった羽を集め、再び空へ──</p>
  <button id="startBtn">羽を探す</button>
</div>

<div id="game">
  <div id="moon"></div>
  <div class="city">
    <div class="building b1"></div>
    <div class="building b3"></div>
    <div class="building b2"></div>
    <div class="building b4"></div>
    <div class="building b5"></div>
    <div class="building b2"></div>
    <div class="building b3"></div>
    <div class="building b4"></div>
    <div class="building b1"></div>
  </div>
  <div id="player"></div>
</div>

<div id="ui">羽: <span id="count">0</span>/5</div>
<div id="instruction">【操作】矢印キー / Shiftでダッシュ</div>
<div id="goal">天空へ戻れる…</div>

<div id="ending">
  <h1>天使は還る</h1>
  <p>光に包まれ、彼は空へ昇っていく──</p>
  <img src="angel_end.png">
</div>

<div id="fade"></div>

<script>
const player=document.getElementById("player");
const game=document.getElementById("game");
const countText=document.getElementById("count");
const goal=document.getElementById("goal");
const story=document.getElementById("story");
const ending=document.getElementById("ending");
const fade=document.getElementById("fade");

let x=100,y=100,count=0;
let dash=false;

function updatePlayer(){ player.style.left=x+"px"; player.style.top=y+"px"; }

document.addEventListener("keydown",e=>{
  if(game.style.display==="none")return;
  if(e.key==="Shift") dash=true;

  player.style.animationPlayState="running";
  let s=dash?10:5;

  if(e.key==="ArrowUp") y-=s;
  if(e.key==="ArrowDown") y+=s;
  if(e.key==="ArrowLeft") x-=s;
  if(e.key==="ArrowRight") x+=s;

  updatePlayer(); checkCollision();
});

document.addEventListener("keyup",e=>{
  if(e.key==="Shift") dash=false;
  player.style.animationPlayState="paused";
});

function createFeather(){
  const f=document.createElement("div");
  f.classList.add("feather");
  f.style.left=Math.random()*(window.innerWidth-30)+"px";
  f.style.top=Math.random()*(window.innerHeight-30)+"px";
  game.appendChild(f);
}

function checkCollision(){
  document.querySelectorAll(".feather").forEach(f=>{
    if(Math.abs(x-f.offsetLeft)<30 && Math.abs(y-f.offsetTop)<30){
      f.remove(); count++; countText.textContent=count;
      if(count===5){ goal.style.display="block"; setTimeout(startFade,1000); }
    }
  });
}

function startFade(){ fade.style.opacity=1; setTimeout(showEnding,2000); }

function showEnding(){
  game.style.display="none";
  document.getElementById("ui").style.display="none";
  document.getElementById("instruction").style.display="none";
  ending.style.display="flex";
}

for(let i=0;i<5;i++) createFeather();

document.getElementById("startBtn").onclick=()=>{
  story.style.display="none";
  game.style.display="block";
  document.getElementById("ui").style.display="block";
  document.getElementById("instruction").style.display="block";
};

updatePlayer();
</script>

</body>
</html>
